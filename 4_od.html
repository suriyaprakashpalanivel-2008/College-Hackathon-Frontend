<!DOCTYPE html>
<html>
<head>
    <title>OD Request Form</title>

   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            background-image: url("https://www.gcee.ac.in/assets/img/blog/img2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

           
            min-height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 25px;

            max-width: 600px;
            width: 90%;              /* responsive for mobile */

            border-radius: 12px;
            box-shadow: 0px 0px 15px black;
        }

        h2 {
            text-align: center;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            font-size: 14px;
            box-sizing: border-box;   /* important */
        }

        label {
            font-weight: bold;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>OD Request Form</h2>

    <form action="student_dashboard.html" method="post">

        
        <label>Register Number</label>
        <input type="text" name="regno" required>

       
        <label>Student Name</label>
        <input type="text" name="name" required>

      
        <label>Roll Number</label>
        <input type="text" name="rollno" required>

       
        <label>Department</label>
        <select name="department" required>
            <option value="">-- Select Department --</option>
            <option>CSE</option>
            <option>CSE-DS</option>
            <option>EEE</option>
            <option>ECE</option>
            <option>MECH</option>
            <option>CIVIL</option>
            <option>AUTOMOBILE</option>
            <option>IT</option>
        </select>

       
        <label>Year of Studying</label>
        <select name="year" required>
            <option value="">-- Select Year --</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select>

    
        <label>Email ID</label>
        <input type="email" name="email" required>

        
        <label>HOD Username</label>
        <input type="text" name="hod_username" placeholder="Enter HOD Username" required>

        
        <label>Class Advisor Username</label>
        <input type="text" name="advisor_username" placeholder="Enter Class Advisor Username" required>

       
        <label>Reason for OD (Subject / Event)</label>
        <input type="text" name="reason" placeholder="Example: Symposium, Workshop, Sports" required>

        
        <label>Reason & Importance of this OD</label>
        <textarea name="description" rows="5" placeholder="Explain why this OD is important..." required></textarea>

        
        <label>Duration for OD</label>
        <input type="text" name="duration" placeholder="Example: 2 Days (25-01-2026 to 26-01-2026)" required>

        
        <label>Add Student Photo</label>
        <input type="file" name="photo" accept="image/*" required>

        
        <label>Add Proof (PDF / Image)</label>
        <input type="file" name="proof" accept=".pdf,image/*" required>

        
        <button type="reset">Save</button>
        <button type="submit">Submit Request</button>

    </form>
</div>

</body>
</html>
