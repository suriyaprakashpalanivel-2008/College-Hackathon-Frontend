<!DOCTYPE html>
<html>
<head>
    <title>Class Advisor Login</title>

   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            background-image: url("https://www.gcee.ac.in/assets/img/blog/img2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

            
            min-height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 30px;

            max-width: 350px;
            width: 90%;             

            border-radius: 12px;
            box-shadow: 0px 0px 15px black;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px 0;
            width: 100%;            
            font-size: 16px;
            box-sizing: border-box; 
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Class Advisor Login</h2>

    <form action="class_advisor_dashboard.html">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
