<!DOCTYPE html>
<html>
<head>
    <title>Principal Login</title>

    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            background-image: url("https://www.gcee.ac.in/assets/img/blog/img2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

            min-height: 100svh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.92);

            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px black;

            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        input {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Principal Login</h2>

    <form action="principal_dashboard.html">
        <input type="text" placeholder="Principal Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
