<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            min-height: 100vh;

            background-image: url("https://www.gcee.ac.in/assets/img/blog/img2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px black;
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        button {
            width: 80%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
        }

        .login-btn {
            background-color: #2196F3;
            color: white;
        }

        .signup-btn {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Welcome to Event Tracker</h2>

    <a href="login.html">
        <button class="login-btn">Login</button>
    </a>

    <a href="signup.html">
        <button class="signup-btn">Sign Up</button>
    </a>
</div>

</body>
</html>
